<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Purchase Access — The Code</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/css/index.css" />
  <style>
    /* minimal paywall overrides to match Matrix theme */
    .paywall-wrap { max-width:980px;margin:40px auto;padding:20px; }
    .pay-grid { display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start; }
    .pay-panel { padding:18px;border-radius:10px;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.45));border:1px solid rgba(0,255,65,0.06); }
    .qr { width:100%;height:auto;border-radius:8px;border:1px solid rgba(0,255,65,0.06);background:#000;padding:8px; }
    .price { font-size:22px;margin-top:8px;color:#00ff41; }
    .pay-actions { display:flex;gap:8px;margin-top:12px;flex-wrap:wrap; }
    .btn { padding:10px 14px;border-radius:999px;border:1px solid rgba(0,255,65,0.08);background:transparent;color:#00ff41;cursor:pointer; }
    .btn.primary { background:rgba(0,255,65,0.04); }
    .small { font-size:13px;color:rgba(0,255,65,0.7); }
  </style>
</head>
<body>
  <div class="paywall-wrap">
    <div id="pay-root" class="pay-panel">
      <!-- content injected by modules/paywall.js -->
    </div>
  </div>

  <script type="module" src="/modules/paywall.js"></script>
</body>
</html>
